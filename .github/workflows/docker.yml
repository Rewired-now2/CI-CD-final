name: Publish Docker Image

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_rewirednow }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_rewirednow }}/parcel-tracker:${{ github.ref_name }} .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_rewirednow }}/parcel-tracker:${{ github.ref_name }}